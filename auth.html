<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autenticación - Science Stone</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .auth-box {
            background: white;
            padding: 50px 40px;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }

        .auth-box h1 {
            font-family: var(--font-serif);
            font-size: 32px;
            text-align: center;
            margin-bottom: 10px;
            color: var(--text-dark);
        }

        .auth-box p {
            text-align: center;
            color: var(--text-light);
            margin-bottom: 30px;
            font-size: 14px;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .auth-form input {
            padding: 14px;
            border: 2px solid var(--border-light);
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .auth-form input:focus {
            outline: none;
            border-color: var(--primary-yellow);
            box-shadow: 0 0 0 3px rgba(255, 204, 0, 0.1);
        }

        .auth-form button {
            padding: 14px;
            background: var(--primary-yellow);
            color: var(--text-dark);
            border: none;
            border-radius: 4px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .auth-form button:hover {
            background: #ffD700;
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }

        .auth-message {
            padding: 12px;
            border-radius: 4px;
            text-align: center;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
        }

        .auth-message.error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ef5350;
        }

        .auth-message.success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #66bb6a;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-logo-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .auth-logo-text {
            font-family: var(--font-serif);
            font-size: 24px;
            color: var(--text-dark);
            margin-bottom: 5px;
        }

        .auth-logo-tagline {
            font-size: 11px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .forgot-password {
            text-align: center;
            margin-top: 15px;
        }

        .forgot-password a {
            color: var(--primary-yellow);
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .auth-box {
                padding: 30px 20px;
            }

            .auth-box h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-logo">
                <div class="auth-logo-icon">⚛️</div>
                <div class="auth-logo-text">Science Stone</div>
                <div class="auth-logo-tagline">Panel de Administración</div>
            </div>

            <h1>Inicia Sesión</h1>
            <p>Accede al panel administrativo de tu blog</p>

            <div id="authMessage" class="auth-message"></div>

            <form class="auth-form" id="authForm">
                <input type="password" id="password" placeholder="Contraseña" required>
                <button type="submit">Ingresar</button>
            </form>

            <div class="forgot-password">
                <a href="#" onclick="showInfo(); return false;">¿Olvidaste la contraseña?</a>
            </div>
        </div>
    </div>

    <script>
        const DEFAULT_PASSWORD = 'Science2026';

        document.getElementById('authForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const messageEl = document.getElementById('authMessage');

            if (password === DEFAULT_PASSWORD) {
                localStorage.setItem('owner_password', password);
                messageEl.textContent = '✅ Autenticación exitosa. Redirigiendo...';
                messageEl.className = 'auth-message success';
                messageEl.style.display = 'block';
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 1500);
            } else {
                messageEl.textContent = '❌ Contraseña incorrecta';
                messageEl.className = 'auth-message error';
                messageEl.style.display = 'block';
                document.getElementById('password').value = '';
            }
        });

        function showInfo() {
            alert('📝 Contraseña predeterminada: Science2026\n\nPuedes cambiarla en el panel de administración.');
        }

        // Si ya está autenticado, redirigir al admin
        if (localStorage.getItem('owner_password')) {
            window.location.href = 'admin.html';
        }
    </script>
</body>
</html>
