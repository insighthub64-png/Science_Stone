<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autenticación - Science Stone</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div style="background: white; padding: 60px 40px; border-radius: 4px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); max-width: 400px; width: 100%;">
        <div style="text-align: center; margin-bottom: 40px;">
            <div style="font-size: 56px; margin-bottom: 20px;">⚛️</div>
            <h1 style="font-family: var(--font-serif); font-size: 28px; font-weight: 400; letter-spacing: 1px; margin-bottom: 10px;">Science Stone</h1>
            <p style="color: var(--text-light); font-size: 13px; text-transform: uppercase; letter-spacing: 1px;">Panel de Administración</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="password">Contraseña de Propietario *</label>
                <input type="password" id="password" placeholder="Ingresa tu contraseña" required autofocus>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px; font-size: 14px;">
                <i class="fas fa-lock"></i> ACCEDER AL PANEL
            </button>
        </form>

        <p style="text-align: center; color: var(--text-light); font-size: 12px; margin-top: 20px;">
            <i class="fas fa-shield-alt"></i> Acceso seguro de administrador
        </p>

        <div id="errorMessage" style="background: #ffe0e0; color: #DC143C; padding: 15px; border-radius: 4px; margin-top: 20px; display: none; text-align: center;">
            <!-- Error aquí -->
        </div>
    </div>

    <script>
        // Verificar si ya está autenticado
        if (localStorage.getItem('owner_password')) {
            window.location.href = 'admin.html';
        }

        function handleLogin(event) {
            event.preventDefault();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMessage');

            // Contraseña por defecto (cambiar en producción)
            const ADMIN_PASSWORD = 'sciencestone2026';

            if (password === ADMIN_PASSWORD) {
                localStorage.setItem('owner_password', password);
                errorMsg.style.display = 'none';
                window.location.href = 'admin.html';
            } else {
                errorMsg.textContent = '❌ Contraseña incorrecta';
                errorMsg.style.display = 'block';
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        }
    </script>
</body>
</html>
